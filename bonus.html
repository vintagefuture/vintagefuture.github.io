        <div class="bonus-div">
            <div id="dad-joke-button-div" class="bonus-button-div">
                <button class="button" id="dad-joke-button">
                    Get a dad joke
                </button>
            </div>
            <div id="dad-joke-card">
                <blockquote class="blockquote">
                    <p id="dad-joke">Dad jokes generator</p>
                </blockquote>
            </div>
        </div>

        <div class="bonus-div">
            <div id="movie-quote-button-div" class="bonus-button-div">
                <button class="button" id="movie-quote-button">
                    Get a movie quote
                </button>
            </div>
            <div id="movie-quote-card">
                <blockquote class="blockquote">
                    <p id="movie-quote">Movie quote generator</p>
                    <footer class="blockquote-footer">
                        <cite id="quoteFrom"></cite>
                    </footer>
                </blockquote>
            </div>
        </div>
    </div>
