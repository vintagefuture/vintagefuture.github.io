<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Array Elements as Columns</title>
    <style>
        .row {
            display: flex;
            flex-wrap: wrap;
            flex-direction: column
        }

        .column {
            width: 33.33%;
            /* Adjust the width according to your preference */
            padding: 1px;
            box-sizing: border-box;
        }

        #columnsContainer {
            width: 500px;
            height: 500px;
        }
    </style>
</head>

<body>

    <div class="row" id="columnsContainer">
        <!-- Columns will be dynamically generated here -->
    </div>

    <script>
        var array = [
            "Age",
            "Athletics",
            "Business",
            "Change",
            "Character",
            "Competition",
            "Conservative",
            "Courage",
            "Creativity",
            "Education",
            "Ethics",
            "Failure",
            "Faith",
            "Family",
            "Famous Quotes",
            "Film",
            "Freedom",
            "Friendship",
            "Future",
            "Generosity",
            "Genius",
            "Gratitude",
            "Happiness",
            "Health",
            "History",
            "Honor",
            "Humor",
            "Humorous",
            "Imagination",
            "Inspirational",
            "Knowledge",
            "Leadership",
            "Life",
            "Literature",
            "Love",
            "Mathematics",
            "Motivational",
            "Nature",
            "Opportunity",
            "Pain",
            "Perseverance",
            "Philosophy",
            "Politics",
            "Power Quotes",
            "Proverb",
            "Religion",
            "Sadness",
            "Science",
            "Self",
            "Self Help",
            "Social Justice",
            "Society",
            "Spirituality",
            "Sports",
            "Stupidity",
            "Success",
            "Technology",
            "Time",
            "Tolerance",
            "Truth",
            "Virtue",
            "War",
            "Weakness",
            "Wellness",
            "Wisdom",
            "Work",
            "Work",
            "Motivational",
            "Nature",
            "Opportunity",
            "Pain",
            "Perseverance",
            "Philosophy",
            "Politics",
            "Power Quotes",
            "Proverb",
            "Religion",
        ];

        function createColumnsFromArray(array) {
            var columnsContainer = document.getElementById("columnsContainer");

            array.forEach(function (element) {
                var columnDiv = document.createElement("div");
                columnDiv.classList.add("column");
                columnDiv.textContent = element;
                columnsContainer.appendChild(columnDiv);
            });
        }

        createColumnsFromArray(array);
    </script>

</body>

</html>
